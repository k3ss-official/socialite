<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Socialite{% endblock %} · Socialite</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('board') }}">Socialite</a>
    <nav>
      <a href="{{ url_for('board') }}" class="{{ 'active' if request.endpoint == 'board' }}">Pipeline</a>
      <a href="{{ url_for('clients') }}" class="{{ 'active' if request.endpoint == 'clients' }}">Clients</a>
      <a href="{{ url_for('events') }}" class="{{ 'active' if request.endpoint == 'events' }}">Events</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
